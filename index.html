      --primary-dark: #e7548f;
      --line: #f2dbe7;
      --chip: #fff1f7;
      --shadow: 0 12px 30px rgba(228, 84, 143, 0.12);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(180deg, #fff8fb 0%, #fffdfd 100%);
      color: var(--text);
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .hero {
      background: radial-gradient(circle at top right, #ffd3e4 0%, #fff8fb 40%, #ffffff 100%);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.05;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .field { margin-bottom: 18px; }

    .label {
      display: block;
      font-size: 14px;
      margin-bottom: 10px;
      color: var(--muted);
      font-weight: 600;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      border: 1px solid var(--line);
      background: var(--chip);
      color: var(--text);
      border-radius: 999px;
      padding: 11px 14px;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 14px;
    }

    .chip:hover { transform: translateY(-1px); }

    .chip.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .results-actions {
      display: flex;
      justify-content: center;
      margin-top: 16px;
    }

    button.primary, button.secondary {
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button.primary {
      background: linear-gradient(135deg, #2f2433 0%, #443248 100%);
      color: white;
      font-weight: 800;
      box-shadow: 0 14px 28px rgba(45, 35, 48, 0.22);
      position: relative;
      overflow: hidden;
      transform: translateY(0);
    }

    button.primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.08) 35%, rgba(255,255,255,0.22) 50%, transparent 65%);
      transform: translateX(-140%);
      transition: transform 0.7s ease;
    }

    button.primary:hover {
      background: linear-gradient(135deg, #241b27 0%, #3a2a3e 100%);
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 18px 34px rgba(45, 35, 48, 0.28);
    }

    button.primary:hover::before {
      transform: translateX(140%);
    }

    button.primary:active {
      transform: translateY(0) scale(0.99);
    }

    button.secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .empty {
      text-align: center;
      padding: 36px 18px;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 18px;
      background: #fffdfd;
      line-height: 1.7;
    }

    .result-list {
      display: grid;
      gap: 14px;
    }

    .idea {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      background: linear-gradient(180deg, #ffffff, #fff9fc);
    }

    .idea-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
      margin-bottom: 8px;
    }

    .idea h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
    }

    .badge {
      flex-shrink: 0;
      background: #ffe6f0;
      color: #b63369;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 12px;
    }

    .meta span {
      font-size: 12px;
      color: var(--muted);
      background: #faf3f7;
      border-radius: 999px;
      padding: 6px 10px;
      border: 1px solid var(--line);
    }

    .idea p {
      margin: 0 0 10px;
      line-height: 1.6;
      font-size: 14px;
    }

    .place-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .link-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .place-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .place-link:hover {
      transform: translateY(-1px);
      border-color: #e3bfd0;
      background: #fff7fb;
    }

    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      .hero, .card { padding: 18px; }
    }
  </style>
</head>

    function scorePlace(place) {
      let score = 0;

      if (state.location === 'any') {
        score += 1;
      } else if (place.area === state.location) {
        score += 7;
      } else {
        score -= 8;
      }

      if (state.budget === 'any') {
        score += 1;
      } else if (place.price === state.budget) {
        score += 6;
      } else if (
        (state.budget === 'mid' && (place.price === 'low' || place.price === 'high')) ||
        (state.budget === 'low' && place.price === 'mid') ||
        (state.budget === 'high' && place.price === 'mid')
      ) {
        score += 1;
      } else {
        score -= 5;
      }

      if (state.duration === 'any' || place.duration === state.duration) score += 2;

      if (state.setting === 'any') {
        score += 1;
      } else if (place.setting === state.setting) {
        score += 3;
      } else if (place.setting === 'mixed' || state.setting === 'mixed') {
        score += 1;
      } else {
        score -= 2;
      }

      if (state.mood === 'any' || place.mood === state.mood) score += 4;

      if (state.budget === 'high' && place.tier === 'premium') score += 4;
      if (state.budget === 'low' && place.tier === 'premium') score -= 4;
      if (state.budget === 'high' && place.tier === 'casual') score -= 3;

      if (recentHistory.includes(place.title)) score -= 2.5;

      return score;
    }

    function shuffleArray(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function getResultKeys(results) {
      return results.map(item => item.title).sort();
    }

    function sameKeys(a, b) {
      return JSON.stringify(a) === JSON.stringify(b);
    }

    function pickResults() {
      const scored = places
        .map(place => ({ ...place, score: scorePlace(place) }))
        .sort((a, b) => b.score - a.score);

      const topScore = scored[0]?.score ?? 0;
      let pool = scored.filter(place => place.score >= topScore - 3);
      if (pool.length < 6) pool = scored.slice(0, Math.min(10, scored.length));

      let bestResults = shuffleArray(pool).slice(0, 3);
      let bestKeys = getResultKeys(bestResults);

      for (let attempt = 0; attempt < 8; attempt++) {
        const candidatePool = attempt < 5 ? pool : scored.slice(0, Math.min(12, scored.length));
        const candidate = shuffleArray(candidatePool).slice(0, 3);
        const candidateKeys = getResultKeys(candidate);

        if (!sameKeys(candidateKeys, lastResultKeys)) {
          bestResults = candidate;
          bestKeys = candidateKeys;
          break;
        }
      }

      lastResultKeys = bestKeys;
      recentHistory = [...new Set([...recentHistory, ...bestKeys])].slice(-6);
      return bestResults.map(item => ({
        ...item,
        googleMapsUrl: item.googleMapsUrl || buildGoogleMapsUrl(item.place),
        googleReviewsUrl: item.googleReviewsUrl || buildGoogleReviewsUrl(item.place)
      }));
    }

    function renderResults() {
      const results = pickResults();
      const root = document.getElementById('results');
      root.innerHTML = `
        <div class="result-list">
          ${results.map(item => `
            <article class="idea">
              <div class="idea-top">
                <h3>${item.title}</h3>
                <span class="badge">${item.badge}</span>
              </div>
              <div class="meta">
                <span>${item.place}</span>
                <span>${item.area}</span>
                <span>${item.setting === 'mixed' ? '混合型' : item.setting === 'indoor' ? '室内' : '室外'}</span>
                ${item.meta.map(tag => `<span>${tag}</span>`).join('')}
              </div>
              <p>${item.desc}</p>
              <div class="place-note">${item.note}</div>
              <div class="link-row">
                <a class="place-link" href="${item.googleMapsUrl}" target="_blank" rel="noopener noreferrer">看地图</a>
                <a class="place-link" href="${item.googleReviewsUrl}" target="_blank" rel="noopener noreferrer">看评价</a>
              </div>
            </article>
          `).join('')}
        </div>
      `;
    }

    document.querySelectorAll('[data-group]').forEach(group => {
      group.addEventListener('click', (e) => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        const key = group.dataset.group;
        state[key] = chip.dataset.value;
        group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
      });
    });

    document.getElementById('generateBtn').addEventListener('click', renderResults);
    document.getElementById('shuffleBtn').addEventListener('click', renderResults);

    document.getElementById('resetBtn').addEventListener('click', () => {
      state.location = 'any';
      state.budget = 'any';
      state.duration = 'any';
      state.setting = 'any';
      state.mood = 'any';
      lastResultKeys = [];
      recentHistory = [];
      document.querySelectorAll('[data-group]').forEach(group => {
        group.querySelectorAll('.chip').forEach((chip, index) => {
          chip.classList.toggle('active', index === 0);
        });
      });
      document.getElementById('results').innerHTML = '<div class="empty">先选条件，然后按一下按钮。</div>';
    });
  </script>
