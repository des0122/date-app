<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今天槟城拍拖去哪里？</title>
  <style>
    :root {
      --bg: #fff8fb;
      --card: #ffffff;
      --text: #2d2330;
      --muted: #7c6b78;
      --primary: #ff6fa9;
      --primary-dark: #e7548f;
      --line: #f2dbe7;
      --chip: #fff1f7;
      --shadow: 0 12px 30px rgba(228, 84, 143, 0.12);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(180deg, #fff8fb 0%, #fffdfd 100%);
      color: var(--text);
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .hero {
      background: radial-gradient(circle at top right, #ffd3e4 0%, #fff8fb 40%, #ffffff 100%);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.05;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      max-width: 720px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .field { margin-bottom: 18px; }

    .label {
      display: block;
      font-size: 14px;
      margin-bottom: 10px;
      color: var(--muted);
      font-weight: 600;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      border: 1px solid var(--line);
      background: var(--chip);
      color: var(--text);
      border-radius: 999px;
      padding: 11px 14px;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 14px;
    }

    .chip:hover { transform: translateY(-1px); }

    .chip.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    button.primary, button.secondary {
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button.primary {
      background: var(--primary);
      color: white;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(231, 84, 143, 0.22);
    }

    button.primary:hover { background: var(--primary-dark); }

    button.secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .tiny {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .empty {
      text-align: center;
      padding: 36px 18px;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 18px;
      background: #fffdfd;
      line-height: 1.7;
    }

    .result-list {
      display: grid;
      gap: 14px;
    }

    .idea {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      background: linear-gradient(180deg, #ffffff, #fff9fc);
    }

    .idea-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
      margin-bottom: 8px;
    }

    .idea h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
    }

    .badge {
      flex-shrink: 0;
      background: #ffe6f0;
      color: #b63369;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 12px;
    }

    .meta span {
      font-size: 12px;
      color: var(--muted);
      background: #faf3f7;
      border-radius: 999px;
      padding: 6px 10px;
      border: 1px solid var(--line);
    }

    .idea p {
      margin: 0 0 10px;
      line-height: 1.6;
      font-size: 14px;
    }

    .place-name {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .place-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 20px;
    }

    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      .hero, .card { padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>今天槟城拍拖去哪里？</h1>
      <p class="subtitle">给在槟城选择困难的情侣一个快一点、甜一点的决定方式。选几个条件，我就帮你配出 3 个今天比较值得出发的真实约会地点。</p>
    </section>

    <div class="grid">
      <section class="card">
        <h2 class="section-title">先选今天的感觉</h2>

        <div class="field">
          <span class="label">预算</span>
          <div class="chips" data-group="budget">
            <button class="chip active" data-value="any">随便啦</button>
            <button class="chip" data-value="low">RM30 以下</button>
            <button class="chip" data-value="mid">RM30 - RM80</button>
            <button class="chip" data-value="high">RM80 以上</button>
          </div>
        </div>

        <div class="field">
          <span class="label">时长</span>
          <div class="chips" data-group="duration">
            <button class="chip active" data-value="any">都可以</button>
            <button class="chip" data-value="short">1 - 2 小时</button>
            <button class="chip" data-value="half">半天</button>
            <button class="chip" data-value="full">全天</button>
          </div>
        </div>

        <div class="field">
          <span class="label">环境</span>
          <div class="chips" data-group="setting">
            <button class="chip active" data-value="any">随便</button>
            <button class="chip" data-value="indoor">室内</button>
            <button class="chip" data-value="outdoor">室外</button>
          </div>
        </div>

        <div class="field">
          <span class="label">心情</span>
          <div class="chips" data-group="mood">
            <button class="chip active" data-value="any">没想法</button>
            <button class="chip" data-value="chill">轻松放空</button>
            <button class="chip" data-value="photo">想拍照</button>
            <button class="chip" data-value="food">想吃东西</button>
            <button class="chip" data-value="special">想有仪式感</button>
          </div>
        </div>

        <div class="actions">
          <button class="primary" id="generateBtn">给我 3 个槟城约会点子</button>
          <button class="secondary" id="shuffleBtn">再换一组</button>
          <button class="secondary" id="resetBtn">重设</button>
        </div>

        <p class="tiny">这版已经改成槟城真实地点 v2。你下一步最值得做的，是继续把地点资料补得更细，例如营业时间、适合白天还是晚上、有没有停车、适不适合下雨天。</p>
      </section>

      <section class="card">
        <h2 class="section-title">推荐结果</h2>
        <div id="results">
          <div class="empty">先选条件，然后按一下按钮。<br/>这次不是泛泛建议，而是比较像真的可以直接去的槟城地点。</div>
        </div>
      </section>
    </div>

    <div class="footer-note">Penang v2 · 纯前端手机网页 · 适合继续慢慢补地点库</div>
  </div>

  <script>
    const state = {
      budget: 'any',
      duration: 'any',
      setting: 'any',
      mood: 'any'
    };

    const places = [
      {
        title: 'Penang Hill 半日约会',
        place: 'Penang Hill / 升旗山',
        area: 'Air Itam',
        price: 'mid',
        duration: 'half',
        setting: 'outdoor',
        mood: 'special',
        badge: '经典',
        meta: ['槟城代表', '半天', '空气比较凉'],
        desc: '适合想认真出门一下、又不想太赶的日子。上山本身就有一点仪式感，走走看看风景，聊天也会比较有 mood。',
        note: '比较适合白天到傍晚。天气好会加很多分。'
      },
      {
        title: 'Hin Bus Depot 文青散步',
        place: 'Hin Bus Depot',
        area: 'George Town',
        price: 'low',
        duration: 'short',
        setting: 'indoor',
        mood: 'photo',
        badge: '出片',
        meta: ['文青感', '适合拍照', '轻松逛'],
        desc: '很适合不想走太远，但又想这次见面有一点内容。看展、拍照、顺便附近找咖啡店，整个 flow 很顺。',
        note: '适合 1 到 2 小时的轻量约会，也很好接下一站吃东西。'
      },
      {
        title: 'Gurney Bay 看海放空',
        place: 'Gurney Bay',
        area: 'Gurney',
        price: 'low',
        duration: 'short',
        setting: 'outdoor',
        mood: 'chill',
        badge: '舒服',
        meta: ['低预算', '海边', '傍晚舒服'],
        desc: '当两个人只是想见面，不想做太复杂的安排，来这里走走吹风就已经够好了。简单，但有陪伴感。',
        note: '傍晚会比中午更适合，晒太阳的问题会少很多。'
      },
      {
        title: 'Armenian Street 老街拍拖 walk',
        place: 'Armenian Street 一带',
        area: 'George Town',
        price: 'low',
        duration: 'half',
        setting: 'outdoor',
        mood: 'photo',
        badge: '好拍',
        meta: ['老街', '边走边拍', '很槟城'],
        desc: '如果你们喜欢边走边看小店、看墙面、顺便拍点照片，这里会很自然。不会太正式，但很有城市约会感。',
        note: '适合搭配甜品店或咖啡店，一整套会更完整。'
      },
      {
        title: 'Queensbay Mall 懒人稳阵约会',
        place: 'Queensbay Mall',
        area: 'Bayan Lepas',
        price: 'mid',
        duration: 'half',
        setting: 'indoor',
        mood: 'chill',
        badge: '稳阵',
        meta: ['室内', '下雨能去', '吃喝都方便'],
        desc: '天气不稳、两个人都有点累、又还是想见面的时候，商场路线其实很强。吃饭、逛逛、买杯饮料，约会压力很低。',
        note: '特别适合下雨天或不想晒太阳的日子。'
      },
      {
        title: 'Straits Quay 傍晚海边路线',
        place: 'Straits Quay',
        area: 'Tanjung Tokong',
        price: 'mid',
        duration: 'half',
        setting: 'outdoor',
        mood: 'special',
        badge: '气氛',
        meta: ['海边感', '适合晚一点', '比较有仪式感'],
        desc: '这里比较适合想让今天看起来稍微认真一点的时候。散步、看海、再找地方坐一下，整体气氛会比普通商场约会更有感觉。',
        note: '傍晚到晚上比较有味道。'
      },
      {
        title: 'Wonderfood Museum 轻松有趣约会',
        place: 'Wonderfood Museum',
        area: 'George Town',
        price: 'mid',
        duration: 'short',
        setting: 'indoor',
        mood: 'photo',
        badge: '有趣',
        meta: ['室内', '适合拍照', '不无聊'],
        desc: '如果你们今天不想只是坐着吃饭，这种轻松型景点很好用。不会太累，也比较容易拍到一些有记忆点的照片。',
        note: '适合和老街散步或找吃的搭在一起。'
      },
      {
        title: 'Batu Ferringhi 海边傍晚散步',
        place: 'Batu Ferringhi',
        area: 'Batu Ferringhi',
        price: 'low',
        duration: 'half',
        setting: 'outdoor',
        mood: 'special',
        badge: '浪漫',
        meta: ['海边', '低预算', '傍晚加分'],
        desc: '很适合那种“今天不要想太多，去一个像约会的地方就好”的日子。海边本身就会帮你把气氛做出来。',
        note: '白天会比较晒，通常傍晚去更舒服。'
      },
      {
        title: 'Gurney Plaza / Paragon 吃饭逛街组合',
        place: 'Gurney Plaza / Gurney Paragon',
        area: 'Gurney',
        price: 'mid',
        duration: 'half',
        setting: 'indoor',
        mood: 'food',
        badge: '省脑',
        meta: ['吃东西方便', '室内', '最容易成行'],
        desc: '当你们连想去哪里都懒得想的时候，这种组合最实用。先解决吃，再慢慢逛，通常不会出大错。',
        note: '适合临时约出来、不想花太多脑力 planning。'
      },
      {
        title: 'Chew Jetty + George Town 小吃线',
        place: 'Chew Jetty 一带',
        area: 'George Town',
        price: 'low',
        duration: 'half',
        setting: 'outdoor',
        mood: 'food',
        badge: '边走边吃',
        meta: ['低预算', '游客感', '轻松'],
        desc: '如果你们想要一点走走看看、再顺便吃点东西的感觉，这条线会很自然。不会太严肃，也比较有探索味道。',
        note: '适合接晚餐或甜品，半天行程比较刚好。'
      },
      {
        title: 'Pinang Peranakan Mansion 文艺路线',
        place: 'Pinang Peranakan Mansion',
        area: 'George Town',
        price: 'mid',
        duration: 'short',
        setting: 'indoor',
        mood: 'special',
        badge: '精致',
        meta: ['室内', '有内容', '比较特别'],
        desc: '想让约会多一点“不是平时随便见面”的感觉，这种地方就很有用。气氛比较安静，也更容易认真聊天。',
        note: '适合接咖啡或晚餐，让整次见面更完整。'
      },
      {
        title: 'The TOP / Komtar 城市景观点',
        place: 'The TOP at Komtar',
        area: 'George Town',
        price: 'high',
        duration: 'short',
        setting: 'indoor',
        mood: 'photo',
        badge: '视野',
        meta: ['拍照感强', '城市 view', '约会感明显'],
        desc: '适合想让这次见面更有记忆点，或者想拍点不像平时逛街那样的照片。会比较像“我们今天有特地来一个地方”。',
        note: '预算会高一点，但视觉效果会更明显。'
      }
    ];

    function scorePlace(place) {
      let score = 0;
      if (state.budget === 'any' || place.price === state.budget) score += 2;
      if (state.duration === 'any' || place.duration === state.duration) score += 2;
      if (state.setting === 'any' || place.setting === state.setting) score += 2;
      if (state.mood === 'any' || place.mood === state.mood) score += 3;
      return score;
    }

    function pickResults() {
      return [...places]
        .map(place => ({ ...place, score: scorePlace(place) + Math.random() * 1.2 }))
        .sort((a, b) => b.score - a.score)
        .slice(0, 3);
    }

    function renderResults() {
      const results = pickResults();
      const root = document.getElementById('results');
      root.innerHTML = `
        <div class="result-list">
          ${results.map(item => `
            <article class="idea">
              <div class="idea-top">
                <h3>${item.title}</h3>
                <span class="badge">${item.badge}</span>
              </div>
              <div class="meta">
                <span>${item.place}</span>
                <span>${item.area}</span>
                ${item.meta.map(tag => `<span>${tag}</span>`).join('')}
              </div>
              <p>${item.desc}</p>
              <div class="place-note">${item.note}</div>
            </article>
          `).join('')}
        </div>
      `;
    }

    document.querySelectorAll('[data-group]').forEach(group => {
      group.addEventListener('click', (e) => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        const key = group.dataset.group;
        state[key] = chip.dataset.value;
        group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
      });
    });

    document.getElementById('generateBtn').addEventListener('click', renderResults);
    document.getElementById('shuffleBtn').addEventListener('click', renderResults);

    document.getElementById('resetBtn').addEventListener('click', () => {
      state.budget = 'any';
      state.duration = 'any';
      state.setting = 'any';
      state.mood = 'any';
      document.querySelectorAll('[data-group]').forEach(group => {
        group.querySelectorAll('.chip').forEach((chip, index) => {
          chip.classList.toggle('active', index === 0);
        });
      });
      document.getElementById('results').innerHTML = '<div class="empty">先选条件，然后按一下按钮。<br/>这次不是泛泛建议，而是比较像真的可以直接去的槟城地点。</div>';
    });
  </script>
</body>
</html>
