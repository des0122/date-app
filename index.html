<head>

  <style>
    :root {
      --bg: #fff8fb;
      --card: #ffffff;
      --text: #2d2330;
      --muted: #7c6b78;
      --primary: #ff6fa9;
      --primary-dark: #e7548f;
      --line: #f2dbe7;
      --chip: #fff1f7;
      --shadow: 0 12px 30px rgba(228, 84, 143, 0.12);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(180deg, #fff8fb 0%, #fffdfd 100%);
      color: var(--text);
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .hero {
      background: radial-gradient(circle at top right, #ffd3e4 0%, #fff8fb 40%, #ffffff 100%);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.05;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      max-width: 760px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .field { margin-bottom: 18px; }

    .label {
      display: block;
      font-size: 14px;
      margin-bottom: 10px;
      color: var(--muted);
      font-weight: 600;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      border: 1px solid var(--line);
      background: var(--chip);
      color: var(--text);
      border-radius: 999px;
      padding: 11px 14px;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 14px;
    }

    .chip:hover { transform: translateY(-1px); }

    .chip.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .results-actions {
      display: flex;
      justify-content: center;
      margin-top: 16px;
    }

    button.primary, button.secondary {
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button.primary {
      background: var(--primary);
      color: white;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(231, 84, 143, 0.22);
    }

    button.primary:hover { background: var(--primary-dark); }

    button.secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .tiny {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .empty {
      text-align: center;
      padding: 36px 18px;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 18px;
      background: #fffdfd;
      line-height: 1.7;
    }

    .result-list {
      display: grid;
      gap: 14px;
    }

    .idea {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      background: linear-gradient(180deg, #ffffff, #fff9fc);
    }

    .idea-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
      margin-bottom: 8px;
    }

    .idea h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
    }

    .badge {
      flex-shrink: 0;
      background: #ffe6f0;
      color: #b63369;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 12px;
    }

    .meta span {
      font-size: 12px;
      color: var(--muted);
      background: #faf3f7;
      border-radius: 999px;
      padding: 6px 10px;
      border: 1px solid var(--line);
    }

    .idea p {
      margin: 0 0 10px;
      line-height: 1.6;
      font-size: 14px;
    }

    .place-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 20px;
    }

    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      .hero, .card { padding: 18px; }
    }
  </style>
</head>

        </div>

        <div class="field">

            <button type="button" class="chip" data-value="special">想有仪式感</button>
          </div>
        </div>

        <div class="actions">

      </section>

        </div>
      </section>
    </div>

    <div class="footer-note">Penang v2.2 · fixed buttons · better shuffle · more premium spots</div>

        title: 'The TOP / Komtar 城市景观点',
        place: 'The TOP at Komtar',
        area: 'George Town',
        price: 'high',
        duration: 'short',
        setting: 'indoor',
        mood: 'photo',
        tier: 'premium',
        badge: '视野',
        meta: ['城市 view', '记忆点高', '拍照感强'],
        desc: '适合想拍点不像平时逛街那样的照片，或者想让这次见面更有我们今天特地来一个地方的感觉。',
        note: '比普通行程更有视觉记忆点。'
      },
      {
        title: 'Eastern & Oriental 下午茶感约会',
        place: 'Eastern & Oriental Hotel 一带',
        area: 'George Town',
        price: 'high',
        duration: 'short',
        setting: 'mixed',
        mood: 'special',
        tier: 'premium',
        badge: '高级感',
        meta: ['afternoon tea vibe', '适合庆祝', '比较优雅'],
        desc: '高预算不一定只能是晚餐，也可以是更优雅、更慢一点的下午约会。整体气质会很不一样。',
        note: '适合想轻一点但还是有仪式感的约会。'
      }
    ];

    function scorePlace(place) {
      let score = 0;

      if (state.budget === 'any') {
        score += 1;
      } else if (place.price === state.budget) {
        score += 6;
      } else if (
        (state.budget === 'mid' && (place.price === 'low' || place.price === 'high')) ||
        (state.budget === 'low' && place.price === 'mid') ||
        (state.budget === 'high' && place.price === 'mid')
      ) {
        score += 1;
      } else {
        score -= 5;
      }

      if (state.duration === 'any' || place.duration === state.duration) score += 2;

      if (state.setting === 'any') {
        score += 1;
      } else if (place.setting === state.setting) {
        score += 3;
      } else if (place.setting === 'mixed' || state.setting === 'mixed') {
        score += 1;
      } else {
        score -= 2;
      }

      if (state.mood === 'any' || place.mood === state.mood) score += 4;

      if (state.budget === 'high' && place.tier === 'premium') score += 4;
      if (state.budget === 'low' && place.tier === 'premium') score -= 4;
      if (state.budget === 'high' && place.tier === 'casual') score -= 3;

      if (recentHistory.includes(place.title)) score -= 2.5;

      return score;
    }

    function shuffleArray(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function getResultKeys(results) {
      return results.map(item => item.title).sort();
    }

    function sameKeys(a, b) {
      return JSON.stringify(a) === JSON.stringify(b);
    }

    function pickResults() {
      const scored = places
        .map(place => ({ ...place, score: scorePlace(place) }))
        .sort((a, b) => b.score - a.score);

      const topScore = scored[0]?.score ?? 0;
      let pool = scored.filter(place => place.score >= topScore - 3);
      if (pool.length < 6) pool = scored.slice(0, Math.min(10, scored.length));

      let bestResults = shuffleArray(pool).slice(0, 3);
      let bestKeys = getResultKeys(bestResults);

      for (let attempt = 0; attempt < 8; attempt++) {
        const candidatePool = attempt < 5 ? pool : scored.slice(0, Math.min(12, scored.length));
        const candidate = shuffleArray(candidatePool).slice(0, 3);
        const candidateKeys = getResultKeys(candidate);

        if (!sameKeys(candidateKeys, lastResultKeys)) {
          bestResults = candidate;
          bestKeys = candidateKeys;
          break;
        }
      }

      lastResultKeys = bestKeys;
      recentHistory = [...new Set([...recentHistory, ...bestKeys])].slice(-6);
      return bestResults;
    }

    function renderResults() {
      const results = pickResults();
      const root = document.getElementById('results');
      root.innerHTML = `
        <div class="result-list">
          ${results.map(item => `
            <article class="idea">
              <div class="idea-top">
                <h3>${item.title}</h3>
                <span class="badge">${item.badge}</span>
              </div>
              <div class="meta">
                <span>${item.place}</span>
                <span>${item.area}</span>
                <span>${item.setting === 'mixed' ? '混合型' : item.setting === 'indoor' ? '室内' : '室外'}</span>
                ${item.meta.map(tag => `<span>${tag}</span>`).join('')}
              </div>
              <p>${item.desc}</p>
              <div class="place-note">${item.note}</div>
            </article>
          `).join('')}
        </div>
      `;
    }

    document.querySelectorAll('[data-group]').forEach(group => {
      group.addEventListener('click', (e) => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        const key = group.dataset.group;
        state[key] = chip.dataset.value;
        group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
      });
    });

    document.getElementById('generateBtn').addEventListener('click', renderResults);
    document.getElementById('shuffleBtn').addEventListener('click', renderResults);

    document.getElementById('resetBtn').addEventListener('click', () => {
      state.budget = 'any';
      state.duration = 'any';
      state.setting = 'any';
      state.mood = 'any';
      lastResultKeys = [];
      recentHistory = [];
      document.querySelectorAll('[data-group]').forEach(group => {
        group.querySelectorAll('.chip').forEach((chip, index) => {
          chip.classList.toggle('active', index === 0);
        });
      });
      document.getElementById('results').innerHTML = '<div class="empty">先选条件，然后按一下按钮。<br/>这版已经修好按钮，也让再换一组更有变化。</div>';
    });
  </script>
</body>
</html>
